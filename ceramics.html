    <div class="container fade-in">
      <div class="work-grid">

        <div class="work-card"
          data-img="images/bleached.png"
          data-title="Bleached"
          data-meta="Ceramic sculpture · 2025"
          data-desc="Unfired clay sculpture of a coral reef. Inspired by the coral organisms I conducted scientific research on in the Great Barrier Reef of Australia in 2024. Sculpture intentionally left &quot;bleached&quot;.">
          <div class="work-card-img"><img src="images/bleached.png" alt="Bleached" /></div>
          <div class="work-info">
            <h3>Bleached</h3>
            <p>Ceramic sculpture · 2025</p>
          </div>
        </div>

        <div class="work-card"
          data-img="images/worlds-within-worlds.png"
          data-title="Worlds Within Worlds"
          data-meta="Ceramic sculpture · 2025"
          data-desc="Worlds Within Worlds is a ceramic sculpture inspired by the unseen worlds that exist within tidepools. Micro ecosystems exist within larger systems; organisms in constant dynamic interaction, hidden beneath the surface.">
          <div class="work-card-img"><img src="images/worlds-within-worlds.png" alt="Worlds Within Worlds" /></div>
          <div class="work-info">
            <h3>Worlds Within Worlds</h3>
            <p>Ceramic sculpture · 2025</p>
          </div>
        </div>

        <div class="work-card"
          data-img="images/white-sculpture.jpeg"
          data-title="[ Title ]"
          data-meta="Ceramic sculpture · [ Year ]"
          data-gallery="images/white-sculpture-detail.jpeg"
          data-desc="">

          <div class="work-info">
            <h3>[ Title ]</h3>
