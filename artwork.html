        gallery: [],
        desc: `At the tide's edge, life entangles. Algae, seaweed, and marine creatures weave themselves into an interconnected web of symbiosis. Above them, a human figure appears only as a reflection, a lock of hair dangling into the tidepool. The water answers with a gentle ripple. In this moment of contact, boundaries between "human" and "nature" loosen.\n\nInspired by the relationships of reciprocity embedded within marine ecosystems, we can reimagine humanity's relationship to the rest of the natural world. Here, the ocean becomes our teacher, offering models for living with—rather than apart from—the world around.`

        desc: `At the Tide's Edge explores the fluid, dynamic world of tidepool ecosystems. Drawing upon a series of plein-air studies the artist created while sitting in the tidepools of Southern California, this abstract watercolor painting combines field notes, sketches, and fleeting observations into a single, cohesive composition. Forms dissolve and merge (seaweed drifting across anemones, water folding over rock), allowing varied elements to blend and interact as they do in the natural world.\n\nBy collecting moments of quiet reciprocity, this piece encourages attention to subtle, interconnected relationships that sustain these environments. At the Tide's Edge is both a meditation on the ecological beauty of tidepools and a call to more closely observe, consider, and care for these delicate ecosystems flourishing with life.`
      },

    // Back link — always goes to the page the user came from
    const params = new URLSearchParams(window.location.search);
    const fromParam = params.get('from');
    if (fromParam) {
      document.getElementById('backLink').href = decodeURIComponent(fromParam);
    }

    // Load work
    const workId = params.get('work');
    const idx = WORKS.findIndex(w => w.id === workId);
    const fromStr = fromParam ? '&from=' + encodeURIComponent(fromParam) : '';

    function navigateTo(url) {
      document.body.classList.add('page-exit');
      setTimeout(() => { window.location.href = url; }, 220);
    }

    if (idx < 0) { window.location.href = 'index.html#work'; } else {
      const work = WORKS[idx];
      const allImgs = [work.img, ...(work.gallery || [])];

      document.title = (work.title !== '[ Title ]' ? work.title : 'Work') + ' — Emma Garman';
      document.getElementById('artMainImg').src = work.img;
      document.getElementById('artMainImg').alt = work.title;
      document.getElementById('artTitle').textContent = work.title;
      document.getElementById('artMeta').textContent = work.meta;

      const descEl = document.getElementById('artDesc');
      if (work.desc) {
        descEl.innerHTML = work.desc.split(/\n\n+/).map(p => '<p>' + p.trim() + '</p>').join('');
      }

      // Gallery arrows + thumbnails
      let currentImgIdx = 0;
      const mainImg = document.getElementById('artMainImg');
      const prevBtn = document.getElementById('artImgPrev');
      const nextBtn = document.getElementById('artImgNext');
      const thumbsWrap = document.getElementById('artThumbs');
      let thumbEls = [];

      function showImg(i) {
        currentImgIdx = ((i % allImgs.length) + allImgs.length) % allImgs.length;
        mainImg.src = allImgs[currentImgIdx];
        thumbEls.forEach((t, j) => t.classList.toggle('active', j === currentImgIdx));
      }

      if (allImgs.length > 1) {
        prevBtn.addEventListener('click', () => showImg(currentImgIdx - 1));
        nextBtn.addEventListener('click', () => showImg(currentImgIdx + 1));
        allImgs.forEach((src, i) => {
          const img = document.createElement('img');
          img.src = src;
          img.className = 'artwork-thumb' + (i === 0 ? ' active' : '');
          img.alt = '';
          img.addEventListener('click', () => showImg(i));
          thumbsWrap.appendChild(img);
          thumbEls.push(img);
        });
      } else if (work.seriesIds && work.seriesIds.length > 1) {
        // Series: arrows navigate between sibling pages
        const seriesIdx = work.seriesIds.indexOf(work.id);
        const prevId = work.seriesIds[(seriesIdx - 1 + work.seriesIds.length) % work.seriesIds.length];
        const nextId = work.seriesIds[(seriesIdx + 1) % work.seriesIds.length];
        prevBtn.addEventListener('click', () => navigateTo('artwork.html?work=' + prevId + fromStr));
        nextBtn.addEventListener('click', () => navigateTo('artwork.html?work=' + nextId + fromStr));
      } else {
        prevBtn.style.display = 'none';
        nextBtn.style.display = 'none';
      }

      // Series thumbnails (navigate to sibling pages)
      if (work.seriesIds && work.seriesIds.length > 1) {
        work.seriesIds.forEach(sid => {
          const sw = WORKS.find(w => w.id === sid);
          if (!sw) return;
          const img = document.createElement('img');
          img.src = sw.img;
          img.className = 'artwork-thumb' + (sw.id === work.id ? ' active' : '');
          img.alt = sw.title;
          img.addEventListener('click', () => navigateTo('artwork.html?work=' + sw.id + fromStr));
          thumbsWrap.appendChild(img);
        });
      }

      // Zoom modal
      const zoomModal = document.getElementById('artZoomModal');
      const zoomImg = document.getElementById('artZoomImg');
      document.getElementById('artZoomBtn').addEventListener('click', () => {
        zoomImg.src = allImgs[currentImgIdx];
        zoomModal.classList.add('active');
        document.body.style.overflow = 'hidden';
      });
      function closeZoom() { zoomModal.classList.remove('active'); document.body.style.overflow = ''; }
      document.getElementById('artZoomClose').addEventListener('click', closeZoom);
      zoomModal.addEventListener('click', e => { if (e.target === zoomModal) closeZoom(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeZoom(); });

      // Back link
      document.getElementById('backLink').addEventListener('click', e => {
        e.preventDefault();
        navigateTo(document.getElementById('backLink').href);
      });

      // Prev / Next artwork
      const prevWork = WORKS[(idx - 1 + WORKS.length) % WORKS.length];
      const nextWork = WORKS[(idx + 1) % WORKS.length];
      const artPrev = document.getElementById('artPrev');
      const artNext = document.getElementById('artNext');
      artPrev.href = 'artwork.html?work=' + prevWork.id + fromStr;
      artNext.href = 'artwork.html?work=' + nextWork.id + fromStr;
      artPrev.addEventListener('click', e => { e.preventDefault(); navigateTo(artPrev.href); });
      artNext.addEventListener('click', e => { e.preventDefault(); navigateTo(artNext.href); });
    }
